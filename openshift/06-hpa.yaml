# =============================================================
# openshift/06-hpa.yaml
# HorizontalPodAutoscaler for backend and frontend.
# Scales between min and max replicas based on CPU utilisation.
# =============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paygate-backend-hpa
  namespace: paygate
  labels:
    app: paygate-backend
    app.kubernetes.io/part-of: paygate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paygate-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paygate-frontend-hpa
  namespace: paygate
  labels:
    app: paygate-frontend
    app.kubernetes.io/part-of: paygate
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paygate-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
